# Formation Survivability 离线难度计算示例配置。
# 真实实验建议每个场景目录各放一份 scene_config.yaml。

scene_name: easy_01
manual_level: Easy
duration: 30.0
dt: 0.1

evaluation_region:
  x_min: -8.0
  x_max: 8.0
  y_min: -2.0
  y_max: 32.0
  z_min: 1.0
  z_max: 3.0

sampling:
  dx: 1.0
  dy: 1.0
  dz: 0.5

formation:
  shape: triangle
  spacing: 1.5
  uav_radius: 0.3
  safe_margin: 0.5

difficulty:
  normalize_min: 0.0
  normalize_max: 30.0
  easy_threshold: 3.5
  medium_threshold: 7.0
