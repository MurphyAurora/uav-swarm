# Coordinates are in the swarm-control NED frame.
# Edit this file when you want to change the obstacle scene.
#
# Field notes:
#   x/y/z: wall center position in NED.
#   length: wall span along the y axis.
#   thickness: wall size along the x axis.
#   height: visual wall height.
#   segment_spacing: spacing for collision points published to local avoidance.
walls:
  # Main wall in front of the swarm.
  - name: front_wall
    x: 3.0
    y: 1.0
    z: 0.9
    length: 30.0
    thickness: 0.25
    height: 4.8
    segment_spacing: 0.6

  # Rear/right boundary wall.
  - name: rear_right_wall
    x: 18.0
    y: 110.0
    z: 0.9
    length: 200.0
    thickness: 0.25
    height: 4.8
    segment_spacing: 0.6

  # Rear/left boundary wall.
  - name: rear_left_wall
    x: 18.0
    y: -108.0
    z: 0.9
    length: 200.0
    thickness: 0.25
    height: 4.8
    segment_spacing: 0.6

# Target ball / mission target. z follows NED, so negative means upward.
target:
  x: 30.0
  y: 26.0
  z: -3.0
  y_spacing: 1.8
