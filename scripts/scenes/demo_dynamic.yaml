scene:
  name: demo_dynamic_crossing
  version: 1
  seed: 42
  level: easy
  duration: 30.0
  dt: 0.5

world:
  frame: NED
  bounds:
    x: [0.0, 35.0]
    y: [-15.0, 30.0]
    z: [-5.0, 0.0]

swarm:
  num_drones: 5
  leader_id: 1
  formation: line
  y_spacing: 1.8

target:
  x: 30.0
  y: 26.0
  z: -3.0

static_obstacles:
  walls:
    - name: front_wall
      x: 3.0
      y: 1.0
      z: 0.9
      length: 30.0
      thickness: 0.25
      height: 4.8
      segment_spacing: 0.6

dynamic_obstacles:
  - name: crossing_ball_1
    type: sphere
    radius: 0.55
    trajectory:
      type: line
      start: [10.0, -10.0, -3.0]
      end: [10.0, 14.0, -3.0]
      speed: 1.0
      start_time: 4.0

  - name: patrol_ball_1
    type: sphere
    radius: 0.45
    trajectory:
      type: circle
      center: [18.0, 8.0, -3.0]
      radius: 4.0
      angular_speed: 0.35
      phase: 0.0
      start_time: 0.0

difficulty:
  level: easy
  expected_crossing_events: 1
  max_obstacle_speed: 1.4
  notes: Small reproducible demo before wiring into ROS.
