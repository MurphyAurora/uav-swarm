# Layer 1: 场景配置层。
# easy benchmark 场景：单个慢速周期穿越障碍，适合离线可复现性验证。
scene:
  name: easy_crossing
  version: 1
  seed: 101
  level: easy
  duration: 90.0
  dt: 0.5

world:
  frame: NED
  bounds:
    x: [0.0, 35.0]
    y: [-15.0, 30.0]
    z: [-5.0, 0.0]

swarm:
  num_drones: 5
  leader_id: 1
  formation: line
  y_spacing: 1.8

target:
  x: 30.0
  y: 26.0
  z: -3.0

static_obstacles:
  walls:
    - name: front_wall
      x: 3.0
      y: 1.0
      z: 0.9
      length: 30.0
      thickness: 0.25
      height: 4.8
      segment_spacing: 0.6

dynamic_obstacles:
  - name: slow_crossing_ball
    type: sphere
    radius: 0.45
    trajectory:
      type: ping_pong_line
      start: [12.0, -8.0, -3.0]
      end: [12.0, 12.0, -3.0]
      speed: 0.7
      start_time: 5.0

difficulty:
  level: easy
  expected_crossing_events: 1
  obstacle_count: 1
  max_obstacle_speed: 0.7
  corridor_width_hint: 20.0
  notes: Single slow periodic crossing obstacle for smoke testing reproducibility.
